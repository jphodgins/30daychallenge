<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30-Day Health Challenge</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card: #ffffff;
    --border: #e2e5e9;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --accent: #4a9d8f;
    --accent-light: #e8f5f1;
    --check: #34d399;
    --streak: #f59e0b;
    --milestone: #8b5cf6;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header-left .subtitle {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .day-badge {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
    font-size: 0.82rem;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .user-select {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.9rem;
    background: var(--card);
    cursor: pointer;
    color: var(--text);
  }

  /* ── Navigation ── */
  .nav {
    display: flex;
    gap: 0;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .nav button {
    background: none;
    border: none;
    padding: 14px 20px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .nav button:hover { color: var(--text); }

  /* ── Main Content ── */
  .main { padding: 24px; max-width: 960px; margin: 0 auto; }

  /* ── Today View ── */
  .today-grid {
    display: grid;
    gap: 10px;
  }
  .activity-row {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    gap: 14px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .activity-row:hover { border-color: var(--accent); }
  .activity-row.checked {
    background: var(--accent-light);
    border-color: #b2dfdb;
  }
  .activity-row .checkbox {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .activity-row.checked .checkbox {
    background: var(--check);
    border-color: var(--check);
  }
  .activity-row.checked .checkbox::after {
    content: '✓';
    color: white;
    font-weight: 700;
    font-size: 0.8rem;
  }
  .activity-info { flex: 1; }
  .activity-name { font-weight: 600; font-size: 0.92rem; }
  .activity-freq { font-size: 0.78rem; color: var(--text-secondary); }
  .activity-streak {
    font-size: 0.78rem;
    color: var(--streak);
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── Day Selector ── */
  .day-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .day-selector button {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text);
  }
  .day-selector button:hover { border-color: var(--accent); }
  .day-selector .current-day {
    font-weight: 600;
    font-size: 0.95rem;
  }

  /* ── Group View ── */
  .group-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .person-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .person-card:hover { border-color: var(--accent); }
  .person-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
  .person-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
  .person-progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin: 10px 0 8px;
    overflow: hidden;
  }
  .person-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .person-stats {
    font-size: 0.78rem;
    color: var(--text-secondary);
  }
  .person-streak-badge {
    display: inline-block;
    font-size: 0.75rem;
    color: var(--streak);
    font-weight: 600;
    margin-top: 4px;
  }

  /* ── Group Detail Grid ── */
  .group-detail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .group-detail-header {
    padding: 16px 18px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .group-detail table {
    width: 100%;
    border-collapse: collapse;
  }
  .group-detail th, .group-detail td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .group-detail th {
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .group-detail .status-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
  }
  .group-detail .status-dot.done { background: var(--check); }

  /* ── Stats View ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .stat-card h3 {
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .stat-big {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .streak-list { list-style: none; }
  .streak-list li {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.88rem;
    border-bottom: 1px solid var(--border);
  }
  .streak-list li:last-child { border-bottom: none; }
  .streak-val { font-weight: 600; color: var(--streak); }

  /* ── Milestones ── */
  .milestone {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 0.88rem;
  }
  .milestone-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .milestone-icon.earned { background: #ede9fe; }
  .milestone-icon.unearned { background: var(--border); opacity: 0.5; }

  /* ── Calendar Mini ── */
  .calendar-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .cal-day {
    width: 22px; height: 22px;
    border-radius: 4px;
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
  }
  .cal-day.empty { background: var(--border); opacity: 0.3; }
  .cal-day.partial { background: #fde68a; color: #92400e; }
  .cal-day.full { background: var(--check); color: white; }
  .cal-day.today { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Setup Screen ── */
  .setup-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    padding: 24px;
  }
  .setup-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  .setup-box h2 {
    font-size: 1.3rem;
    margin-bottom: 8px;
  }
  .setup-box p {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .setup-buttons {
    display: grid;
    gap: 10px;
  }
  .setup-btn {
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--card);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .setup-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 16px; }
    .main { padding: 16px; }
    .nav { padding: 0 16px; }
    .nav button { padding: 12px 14px; font-size: 0.82rem; }
    .group-cards { grid-template-columns: 1fr 1fr; }
  }

  /* ── Hidden ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══ Setup Screen ═══ -->
<div id="setupScreen" class="setup-screen">
  <div class="setup-box">
    <h2>30-Day Health Challenge</h2>
    <p>April 27 – May 26, 2026<br>Pick your name to get started.</p>
    <div class="setup-buttons" id="setupButtons"></div>
  </div>
</div>

<!-- ═══ App Shell ═══ -->
<div id="appShell" class="hidden">
  <div class="header">
    <div class="header-left">
      <h1>30-Day Challenge</h1>
      <div class="subtitle">April 27 – May 26, 2026</div>
    </div>
    <div class="header-right">
      <div class="day-badge" id="dayBadge">Day 1 of 30</div>
      <select class="user-select" id="userSelect"></select>
    </div>
  </div>

  <div class="nav">
    <button class="active" data-view="today">My Day</button>
    <button data-view="group">Group</button>
    <button data-view="stats">Stats</button>
  </div>

  <!-- ── Today View ── -->
  <div class="main" id="viewToday">
    <div class="day-selector">
      <button id="prevDay">← Prev</button>
      <span class="current-day" id="selectedDayLabel">Today – Day 1</span>
      <button id="nextDay">Next →</button>
    </div>
    <div class="today-grid" id="todayGrid"></div>
  </div>

  <!-- ── Group View ── -->
  <div class="main hidden" id="viewGroup">
    <div class="group-cards" id="groupCards"></div>
    <div class="group-detail" id="groupDetail">
      <div class="group-detail-header">
        <span id="groupDetailTitle">Today's Progress</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Activity</th>
            <th>James</th>
            <th>Zack</th>
            <th>Juan</th>
            <th>Martha</th>
          </tr>
        </thead>
        <tbody id="groupTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Stats View ── -->
  <div class="main hidden" id="viewStats">
    <div class="stats-grid" id="statsGrid"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ═══ Firebase SDK ═══ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ═══════════════════════════════════════════════
// CONFIGURATION — Replace with your Firebase config
// ═══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCYbVxHy2FTZzCwIwLNcdKJs1mTpNRILSM",
  authDomain: "day-challenge-59de4.firebaseapp.com",
  databaseURL: "https://health-challenge-30-default-rtdb.firebaseio.com",
  projectId: "day-challenge-59de4",
  storageBucket: "day-challenge-59de4.firebasestorage.app",
  messagingSenderId: "947053810239",
  appId: "1:947053810239:web:23e70b35871e790a311e8a"
};

// ═══════════════════════════════════════════════
// CHALLENGE SETTINGS
// ═══════════════════════════════════════════════
const USERS = ['James', 'Zack', 'Juan', 'Martha'];
const START_DATE = new Date(2026, 3, 27); // April 27, 2026
const TOTAL_DAYS = 30;

const ACTIVITIES = [
  { id: 'journal',    name: 'Journal',            icon: '📓', freq: 'daily' },
  { id: 'walk',       name: 'Walk / Run 1 Mile',  icon: '🏃', freq: 'daily' },
  { id: 'steps',      name: '10k Steps',          icon: '👟', freq: 'daily' },
  { id: 'stretch',    name: 'Stretching',         icon: '🧘', freq: 'daily' },
  { id: 'meditate',   name: 'Meditate',           icon: '🧠', freq: 'daily' },
  { id: 'skincare',   name: 'Skin Care',          icon: '✨', freq: 'daily' },
  { id: 'coldshower', name: 'Cold Shower',        icon: '🚿', freq: 'weekly' },
  { id: 'water',      name: 'Gallon of Water',    icon: '💧', freq: 'daily' },
  { id: 'gratitude',  name: '3 Gratitudes',       icon: '🙏', freq: 'daily' },
];

const DAILY_ACTIVITIES = ACTIVITIES.filter(a => a.freq === 'daily');
const WEEKLY_ACTIVITIES = ACTIVITIES.filter(a => a.freq === 'weekly');

const MILESTONES = [
  { threshold: 7,  label: 'First week done',     icon: '🌱' },
  { threshold: 14, label: 'Two weeks strong',     icon: '💪' },
  { threshold: 21, label: 'Three weeks — habit formed', icon: '🔥' },
  { threshold: 30, label: 'Challenge complete',   icon: '🏆' },
];

const ENCOURAGEMENTS = [
  "Keep it up! 💪", "You're building something great.", "Consistency is the goal.",
  "One day at a time.", "Your future self thanks you.", "Progress, not perfection.",
  "Small steps, big results.", "You showed up today — that's what counts.",
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let db = null;
let currentUser = localStorage.getItem('challengeUser') || null;
let selectedDay = null; // day number (1-30)
let allData = {}; // synced from Firebase
let groupViewUser = null; // selected user in group view

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  // Init Firebase
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e) {
    console.warn('Firebase init failed — running in offline/demo mode');
    db = null;
  }

  // Calculate current day
  selectedDay = getCurrentDay();

  if (currentUser) {
    showApp();
  } else {
    showSetup();
  }
}

function getCurrentDay() {
  const now = new Date();
  now.setHours(0,0,0,0);
  const start = new Date(START_DATE);
  start.setHours(0,0,0,0);
  const diff = Math.floor((now - start) / 86400000) + 1;
  return Math.max(1, Math.min(diff, TOTAL_DAYS));
}

function getWeekNumber(dayNum) {
  return Math.ceil(dayNum / 7);
}

function getDayDate(dayNum) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + dayNum - 1);
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

// ═══════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════
function showSetup() {
  document.getElementById('setupScreen').classList.remove('hidden');
  document.getElementById('appShell').classList.add('hidden');

  const container = document.getElementById('setupButtons');
  container.innerHTML = '';
  USERS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'setup-btn';
    btn.textContent = name;
    btn.onclick = () => {
      currentUser = name;
      localStorage.setItem('challengeUser', name);
      showApp();
    };
    container.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
function showApp() {
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');

  // Populate user select
  const sel = document.getElementById('userSelect');
  sel.innerHTML = '';
  USERS.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    if (u === currentUser) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = () => {
    currentUser = sel.value;
    localStorage.setItem('challengeUser', currentUser);
    renderCurrentView();
  };

  // Nav
  document.querySelectorAll('.nav button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showView(btn.dataset.view);
    };
  });

  // Day nav
  document.getElementById('prevDay').onclick = () => { if (selectedDay > 1) { selectedDay--; renderToday(); } };
  document.getElementById('nextDay').onclick = () => { if (selectedDay < TOTAL_DAYS) { selectedDay++; renderToday(); } };

  // Update day badge
  updateDayBadge();

  // Listen to Firebase
  if (db) {
    db.ref('challenge').on('value', snap => {
      allData = snap.val() || {};
      renderCurrentView();
    });
  } else {
    // Offline mode — load from localStorage
    try { allData = JSON.parse(localStorage.getItem('challengeData') || '{}'); } catch(e) { allData = {}; }
    renderCurrentView();
  }
}

function updateDayBadge() {
  const today = getCurrentDay();
  const badge = document.getElementById('dayBadge');
  if (today < 1) {
    badge.textContent = 'Starts Apr 27';
  } else if (today > TOTAL_DAYS) {
    badge.textContent = 'Challenge Complete! 🏆';
  } else {
    badge.textContent = `Day ${today} of ${TOTAL_DAYS}`;
  }
}

function showView(view) {
  ['viewToday', 'viewGroup', 'viewStats'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1)).classList.remove('hidden');
  renderCurrentView();
}

function renderCurrentView() {
  const active = document.querySelector('.nav button.active');
  if (!active) return;
  const view = active.dataset.view;
  if (view === 'today') renderToday();
  else if (view === 'group') renderGroup();
  else if (view === 'stats') renderStats();
}

// ═══════════════════════════════════════════════
// DATA HELPERS
// ═══════════════════════════════════════════════
function getUserDayData(user, day) {
  return (allData[user] && allData[user]['day' + day]) || {};
}

function isChecked(user, day, activityId) {
  const dayData = getUserDayData(user, day);
  return !!dayData[activityId];
}

function toggleActivity(activityId) {
  const key = `${currentUser}/day${selectedDay}/${activityId}`;
  const current = isChecked(currentUser, selectedDay, activityId);
  const newVal = !current;

  if (db) {
    db.ref('challenge/' + key).set(newVal);
  } else {
    // Offline
    if (!allData[currentUser]) allData[currentUser] = {};
    if (!allData[currentUser]['day' + selectedDay]) allData[currentUser]['day' + selectedDay] = {};
    allData[currentUser]['day' + selectedDay][activityId] = newVal;
    localStorage.setItem('challengeData', JSON.stringify(allData));
    renderCurrentView();
  }

  // Check for milestone toast
  if (newVal) {
    checkMilestoneToast();
  }
}

function getDailyCount(user, day) {
  const data = getUserDayData(user, day);
  return DAILY_ACTIVITIES.filter(a => !!data[a.id]).length;
}

function getDailyTotal() {
  return DAILY_ACTIVITIES.length;
}

function isWeeklyDone(user, weekNum, activityId) {
  const startDay = (weekNum - 1) * 7 + 1;
  const endDay = Math.min(weekNum * 7, TOTAL_DAYS);
  for (let d = startDay; d <= endDay; d++) {
    if (isChecked(user, d, activityId)) return true;
  }
  return false;
}

function getStreak(user, activityId) {
  let streak = 0;
  const today = getCurrentDay();
  for (let d = today; d >= 1; d--) {
    if (ACTIVITIES.find(a => a.id === activityId).freq === 'weekly') {
      const week = getWeekNumber(d);
      if (isWeeklyDone(user, week, activityId)) {
        // Count all days of this week as part of streak and skip to prev week
        streak++;
        d = (week - 1) * 7 + 1; // will decrement to last day of prev week
      } else {
        break;
      }
    } else {
      if (isChecked(user, d, activityId)) {
        streak++;
      } else if (d < today) {
        break; // allow today to be unchecked
      } else {
        break;
      }
    }
  }
  return streak;
}

function getOverallStreak(user) {
  let streak = 0;
  const today = getCurrentDay();
  for (let d = today; d >= 1; d--) {
    const count = getDailyCount(user, d);
    if (count === getDailyTotal()) {
      streak++;
    } else if (d < today) {
      break;
    } else {
      break;
    }
  }
  return streak;
}

function getTotalPoints(user) {
  let points = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const data = getUserDayData(user, d);
    ACTIVITIES.forEach(a => {
      if (data[a.id]) points++;
    });
  }
  return points;
}

function getCompletedDays(user) {
  let count = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    if (getDailyCount(user, d) === getDailyTotal()) count++;
  }
  return count;
}

// ═══════════════════════════════════════════════
// RENDER: TODAY
// ═══════════════════════════════════════════════
function renderToday() {
  const grid = document.getElementById('todayGrid');
  const label = document.getElementById('selectedDayLabel');
  const today = getCurrentDay();
  const date = getDayDate(selectedDay);
  const weekNum = getWeekNumber(selectedDay);

  const isToday = selectedDay === today;
  label.textContent = isToday
    ? `Today – Day ${selectedDay} · ${formatDate(date)}`
    : `Day ${selectedDay} · ${formatDate(date)}`;

  grid.innerHTML = '';

  // Daily activities
  DAILY_ACTIVITIES.forEach(activity => {
    const checked = isChecked(currentUser, selectedDay, activity.id);
    const streak = getStreak(currentUser, activity.id);
    const row = document.createElement('div');
    row.className = 'activity-row' + (checked ? ' checked' : '');
    row.onclick = () => toggleActivity(activity.id);
    row.innerHTML = `
      <div class="checkbox"></div>
      <div class="activity-info">
        <div class="activity-name">${activity.icon} ${activity.name}</div>
        <div class="activity-freq">Daily</div>
      </div>
      ${streak > 1 ? `<div class="activity-streak">🔥 ${streak} day streak</div>` : ''}
    `;
    grid.appendChild(row);
  });

  // Weekly activities
  WEEKLY_ACTIVITIES.forEach(activity => {
    const weekDone = isWeeklyDone(currentUser, weekNum, activity.id);
    const dayChecked = isChecked(currentUser, selectedDay, activity.id);
    const streak = getStreak(currentUser, activity.id);
    const row = document.createElement('div');
    row.className = 'activity-row' + (dayChecked ? ' checked' : '');
    row.onclick = () => toggleActivity(activity.id);
    row.innerHTML = `
      <div class="checkbox"></div>
      <div class="activity-info">
        <div class="activity-name">${activity.icon} ${activity.name}</div>
        <div class="activity-freq">Once per week ${weekDone && !dayChecked ? ' · ✅ Done this week' : ' · Week ' + weekNum}</div>
      </div>
      ${streak > 1 ? `<div class="activity-streak">🔥 ${streak} week streak</div>` : ''}
    `;
    grid.appendChild(row);
  });

  // Encouragement
  const dailyDone = getDailyCount(currentUser, selectedDay);
  if (dailyDone === getDailyTotal()) {
    showToast("All daily activities complete! " + ENCOURAGEMENTS[selectedDay % ENCOURAGEMENTS.length]);
  }
}

// ═══════════════════════════════════════════════
// RENDER: GROUP
// ═══════════════════════════════════════════════
function renderGroup() {
  const cardsContainer = document.getElementById('groupCards');
  const tbody = document.getElementById('groupTableBody');
  const today = getCurrentDay();
  const weekNum = getWeekNumber(selectedDay);

  // Person cards
  cardsContainer.innerHTML = '';
  USERS.forEach(user => {
    const done = getDailyCount(user, today);
    const total = getDailyTotal();
    const pct = Math.round((done / total) * 100);
    const streak = getOverallStreak(user);

    const card = document.createElement('div');
    card.className = 'person-card' + (user === currentUser ? ' selected' : '');
    card.innerHTML = `
      <div class="person-name">${user}${user === currentUser ? ' (you)' : ''}</div>
      <div class="person-progress-bar"><div class="person-progress-fill" style="width:${pct}%"></div></div>
      <div class="person-stats">${done}/${total} today · ${pct}%</div>
      ${streak > 0 ? `<div class="person-streak-badge">🔥 ${streak} day streak</div>` : ''}
    `;
    cardsContainer.appendChild(card);
  });

  // Detail table
  document.getElementById('groupDetailTitle').textContent = `Day ${today} — ${formatDate(getDayDate(today))}`;
  tbody.innerHTML = '';

  ACTIVITIES.forEach(activity => {
    const tr = document.createElement('tr');
    const isWeekly = activity.freq === 'weekly';
    let cells = `<td>${activity.icon} ${activity.name}${isWeekly ? ' <span style="color:var(--text-secondary);font-size:0.75rem">(weekly)</span>' : ''}</td>`;

    USERS.forEach(user => {
      let done;
      if (isWeekly) {
        done = isWeeklyDone(user, getWeekNumber(today), activity.id);
      } else {
        done = isChecked(user, today, activity.id);
      }
      cells += `<td><span class="status-dot ${done ? 'done' : ''}"></span></td>`;
    });

    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
}

// ═══════════════════════════════════════════════
// RENDER: STATS
// ═══════════════════════════════════════════════
function renderStats() {
  const grid = document.getElementById('statsGrid');
  const today = getCurrentDay();
  grid.innerHTML = '';

  // ── My Progress Card ──
  const completedDays = getCompletedDays(currentUser);
  const totalPoints = getTotalPoints(currentUser);
  const maxPoints = TOTAL_DAYS * ACTIVITIES.length;
  const overallStreak = getOverallStreak(currentUser);

  grid.innerHTML += `
    <div class="stat-card">
      <h3>My Progress</h3>
      <div class="stat-big">${completedDays}</div>
      <div class="stat-label">perfect days out of ${Math.min(today, TOTAL_DAYS)}</div>
      <div style="margin-top:12px">
        <div class="stat-label">Total check-offs: <strong>${totalPoints}</strong></div>
        <div class="stat-label">Overall streak: <strong>${overallStreak > 0 ? '🔥 ' + overallStreak + ' days' : 'Start today!'}</strong></div>
      </div>
    </div>
  `;

  // ── My Streaks Card ──
  let streakHTML = '<div class="stat-card"><h3>My Activity Streaks</h3><ul class="streak-list">';
  ACTIVITIES.forEach(a => {
    const s = getStreak(currentUser, a.id);
    const unit = a.freq === 'weekly' ? 'wk' : 'd';
    streakHTML += `<li><span>${a.icon} ${a.name}</span><span class="streak-val">${s > 0 ? '🔥 ' + s + unit : '—'}</span></li>`;
  });
  streakHTML += '</ul></div>';
  grid.innerHTML += streakHTML;

  // ── My Calendar Card ──
  let calHTML = '<div class="stat-card"><h3>My 30-Day Map</h3><div class="calendar-row">';
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const done = getDailyCount(currentUser, d);
    const total = getDailyTotal();
    let cls = 'cal-day';
    if (d > today) cls += ' empty';
    else if (done === total) cls += ' full';
    else if (done > 0) cls += ' partial';
    else cls += ' empty';
    if (d === today) cls += ' today';
    calHTML += `<div class="${cls}">${d}</div>`;
  }
  calHTML += '</div><div style="margin-top:10px;font-size:0.75rem;color:var(--text-secondary)">🟩 All done &nbsp; 🟨 Partial &nbsp; ⬜ None</div></div>';
  grid.innerHTML += calHTML;

  // ── Team Milestones Card ──
  const teamCompletedDays = USERS.reduce((sum, u) => sum + getCompletedDays(u), 0);
  let mileHTML = '<div class="stat-card"><h3>Team Milestones</h3>';
  const teamMilestones = [
    { threshold: 10,  label: 'Team hits 10 perfect days',   icon: '🌱' },
    { threshold: 30,  label: 'Team hits 30 perfect days',   icon: '🌿' },
    { threshold: 60,  label: 'Team hits 60 perfect days',   icon: '🌳' },
    { threshold: 100, label: 'Team hits 100 perfect days',  icon: '🏔️' },
    { threshold: 120, label: 'Everyone perfect every day',   icon: '🏆' },
  ];
  teamMilestones.forEach(m => {
    const earned = teamCompletedDays >= m.threshold;
    mileHTML += `
      <div class="milestone">
        <div class="milestone-icon ${earned ? 'earned' : 'unearned'}">${m.icon}</div>
        <span style="${earned ? 'font-weight:600' : 'color:var(--text-secondary)'}">${m.label} (${m.threshold})</span>
        ${earned ? '<span style="margin-left:auto;color:var(--check)">✓</span>' : `<span style="margin-left:auto;color:var(--text-secondary);font-size:0.78rem">${teamCompletedDays}/${m.threshold}</span>`}
      </div>
    `;
  });
  mileHTML += '</div>';
  grid.innerHTML += mileHTML;

  // ── Personal Milestones Card ──
  let pMileHTML = '<div class="stat-card"><h3>My Milestones</h3>';
  MILESTONES.forEach(m => {
    const earned = completedDays >= m.threshold;
    pMileHTML += `
      <div class="milestone">
        <div class="milestone-icon ${earned ? 'earned' : 'unearned'}">${m.icon}</div>
        <span style="${earned ? 'font-weight:600' : 'color:var(--text-secondary)'}">${m.label}</span>
        ${earned ? '<span style="margin-left:auto;color:var(--check)">✓</span>' : `<span style="margin-left:auto;color:var(--text-secondary);font-size:0.78rem">${completedDays}/${m.threshold}</span>`}
      </div>
    `;
  });
  pMileHTML += '</div>';
  grid.innerHTML += pMileHTML;

  // ── Group Leaderboard-free comparison ──
  let groupHTML = '<div class="stat-card"><h3>Group Check-in</h3>';
  USERS.forEach(u => {
    const pts = getTotalPoints(u);
    const days = getCompletedDays(u);
    const pct = Math.round((pts / Math.max(1, Math.min(today, TOTAL_DAYS) * ACTIVITIES.length)) * 100);
    groupHTML += `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:600">${u}${u === currentUser ? ' (you)' : ''}</div>
          <div style="font-size:0.78rem;color:var(--text-secondary)">${days} perfect days · ${pts} check-offs</div>
        </div>
        <div style="font-size:1.1rem;font-weight:700;color:var(--accent)">${pct}%</div>
      </div>
    `;
  });
  groupHTML += '</div>';
  grid.innerHTML += groupHTML;
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
}

function checkMilestoneToast() {
  const days = getCompletedDays(currentUser);
  const milestone = MILESTONES.find(m => m.threshold === days);
  if (milestone) {
    setTimeout(() => showToast(`${milestone.icon} ${milestone.label}!`), 500);
  }
}

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
init();
</script>
